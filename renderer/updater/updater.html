<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Freq.Phull Updater</title>
<style>
  :root {
    --bg:#0a0a0a; --bg2:#141414; --bg3:#1c1c1c; --bg4:#252525;
    --white:#fff; --off:#e8e8e8; --muted:#9a9a9a; --hint:#666;
    --border:#222; --border2:#2c2c2c; --accent:#7ed982;
    --ease-out-quart: cubic-bezier(.165,.84,.44,1);
    --ease-spring:    cubic-bezier(.34,1.56,.64,1);
  }
  @font-face {
    font-family:'Bebas Neue';
    src:url('fonts/BebasNeue-Regular.woff2') format('woff2');
    font-display:swap;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{
    background:var(--bg);color:var(--white);
    font-family:'Inter','Segoe UI Variable','Segoe UI',system-ui,-apple-system,sans-serif;
    -webkit-app-region:drag; user-select:none; overflow:hidden;
    height:100vh; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
    font-size:13px;
  }

  /* -- Topbar ----------------------------------------------------- */
  .topbar {
    display:flex; align-items:center; gap:10px;
    padding:9px 14px; background:var(--bg2);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .topbar-logo {
    width:22px; height:22px; background:var(--white); color:var(--bg);
    border-radius:5px; display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue','Oswald','Impact',sans-serif;
    font-size:14px; font-weight:700; letter-spacing:.5px;
  }
  .topbar-title {
    font-family:'Bebas Neue','Oswald','Impact','Haettenschweiler','Arial Narrow',sans-serif;
    font-size:15px; letter-spacing:2px; color:var(--white);
  }
  .topbar-sub { color:var(--muted); font-size:11px; letter-spacing:.4px; }
  .topbar-spacer { flex:1; }
  .topbar-btn {
    -webkit-app-region:no-drag; cursor:pointer;
    width:28px; height:22px; background:transparent; border:none;
    color:var(--muted); font-size:12px; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    transition:background 140ms ease, color 140ms ease;
  }
  .topbar-btn:hover{background:var(--bg3);color:var(--white)}
  .topbar-btn svg{display:block}

  /* -- Body ------------------------------------------------------- */
  .body {
    flex:1; overflow-y:auto;
    padding:28px 32px 24px;
    -webkit-app-region:no-drag;
    display:flex; flex-direction:column; align-items:center;
  }

  /* Language pill */
  .lang-toggle {
    display:flex; background:var(--bg3); border-radius:5px;
    padding:2px; margin-bottom:14px;
    border:1px solid var(--border);
  }
  .lang-toggle button {
    background:transparent; border:none; color:var(--muted); cursor:pointer;
    padding:4px 12px; font-size:10px; font-weight:600; border-radius:4px;
    letter-spacing:.6px; transition:all 160ms ease;
    font-family:inherit;
  }
  .lang-toggle button.on { background:var(--white); color:var(--bg); }

  /* Hero */
  .hero-title {
    font-family:'Bebas Neue','Oswald','Anton','Impact','Haettenschweiler',sans-serif;
    font-size:28px; letter-spacing:3px;
    margin:6px 0 6px;
    text-align:center;
  }
  .hero-sub {
    color:var(--muted); font-size:12.5px; text-align:center;
    margin-bottom:20px; max-width:380px; line-height:1.5;
  }

  /* Status badge */
  .status-badge {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--bg3); border:1px solid var(--border2);
    color:var(--off);
    padding:5px 12px; border-radius:12px;
    font-size:10px; font-weight:600; letter-spacing:1.2px;
    margin-bottom:18px;
    transition:background 240ms, border-color 240ms, color 240ms;
  }
  .status-badge::before {
    content:""; width:6px; height:6px; border-radius:50%;
    background:currentColor;
  }
  .status-badge.ok { color:var(--accent); border-color:rgba(126,217,130,.3); }
  .status-badge.update { color:#6ab0ff; border-color:rgba(106,176,255,.3); }

  /* Version cards */
  .versions {
    display:flex; align-items:center; gap:12px;
    margin:4px 0 6px;
  }
  .vcard {
    background:linear-gradient(180deg, rgba(255,255,255,.018) 0%, transparent 60%), var(--bg2);
    border:1px solid var(--border2); border-radius:8px;
    padding:11px 22px; text-align:center; min-width:120px;
    transition:border-color 220ms, transform 220ms var(--ease-out-quart);
  }
  .vcard-label {
    font-size:8.5px; letter-spacing:1.8px; color:var(--muted); margin-bottom:5px;
    font-weight:600;
  }
  .vcard-num {
    font-family:'Bebas Neue','Oswald','Anton','Impact',sans-serif;
    font-size:24px; letter-spacing:2px; line-height:1;
  }
  .vcard.new { border-color:rgba(106,176,255,.25); }
  .vcard.new .vcard-num { color:#6ab0ff; }
  .varrow {
    color:var(--muted);
    display:flex; align-items:center;
  }
  .varrow svg{display:block}

  /* What's new */
  .whats-new {
    margin-top:18px; width:100%; max-width:460px;
    background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    padding:12px 14px;
  }
  .whats-new-title {
    font-size:9px; letter-spacing:1.8px; color:var(--muted); margin-bottom:8px;
    font-weight:600;
  }
  .whats-new-list {
    list-style:none;
    display:flex; flex-direction:column; gap:5px;
    max-height:160px; overflow-y:auto;
  }
  .whats-new-list li {
    font-size:12px; color:var(--off);
    padding:6px 10px; padding-left:24px;
    background:var(--bg3); border-radius:5px;
    line-height:1.4; position:relative;
  }
  .whats-new-list li::before {
    content:""; position:absolute;
    left:10px; top:50%; transform:translateY(-50%);
    width:5px; height:5px; border-radius:50%;
    background:var(--muted);
  }

  /* Progress (download) */
  .progress-wrap { width:100%; max-width:460px; margin-top:12px; display:none; }
  .progress-wrap.on { display:block; }
  .progress-bar {
    width:100%; height:4px; background:var(--bg3); border-radius:2px;
    overflow:hidden; margin-top:6px;
  }
  .progress-fill {
    height:100%; background:linear-gradient(90deg,#6ab0ff,#7ed982);
    width:0%; transition:width 300ms ease;
  }
  .progress-text {
    font-size:10.5px; color:var(--muted); text-align:center;
    letter-spacing:.5px;
  }

  /* Footer */
  .footer {
    display:flex; gap:8px; padding:12px 16px;
    background:var(--bg2); border-top:1px solid var(--border);
    -webkit-app-region:no-drag; flex-shrink:0;
  }
  .footer button {
    flex:1; padding:10px; border-radius:6px;
    font-size:11.5px; font-weight:600;
    letter-spacing:1px;
    cursor:pointer; border:none;
    font-family:inherit;
    transition:all 160ms cubic-bezier(.215,.61,.355,1);
  }
  .footer button:focus-visible {
    outline:none;
    box-shadow:0 0 0 3px rgba(255,255,255,.22);
  }
  .btn-primary {
    background:var(--white); color:var(--bg);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4);
  }
  .btn-primary:hover { background:#f0f0f0; transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); filter:brightness(.92); }
  .btn-secondary {
    background:var(--bg3); color:var(--off);
    border:1px solid var(--border2);
  }
  .btn-secondary:hover { background:var(--bg4); color:var(--white); }

  /* ===============================================================
   * INSTALLING TAKEOVER - full-screen branded screen replacing the
   * 1988 wizard during update-restart.
   * =============================================================== */
  body.installing .body { justify-content:center; padding-top:0; }
  body.installing .hero-title { font-size:36px; letter-spacing:5px; margin:20px 0 10px; }
  body.installing .hero-sub { font-size:13px; max-width:440px; }
  body.installing .versions,
  body.installing .status-badge,
  body.installing .whats-new,
  body.installing .lang-toggle,
  body.installing .topbar-btn,
  body.installing .footer { display:none !important; }
  body.installing .topbar { border-bottom-color:transparent; background:transparent; }

  .install-mark {
    width:72px; height:72px; margin:0 auto 12px;
    display:none; align-items:center; justify-content:center;
    font-family:'Bebas Neue','Oswald','Impact',sans-serif;
    font-size:42px; letter-spacing:1px;
    background:linear-gradient(180deg, var(--bg3) 0%, var(--bg2) 100%);
    border:1px solid var(--border2); border-radius:14px;
    color:var(--white);
    animation: install-mark-pulse 1.6s ease-in-out infinite;
    box-shadow:0 10px 28px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.04) inset;
  }
  @keyframes install-mark-pulse {
    0%, 100% { transform:scale(1);    box-shadow:0 10px 28px rgba(0,0,0,.5), 0 0 0 rgba(255,255,255,0) inset; }
    50%      { transform:scale(1.04); box-shadow:0 14px 36px rgba(0,0,0,.6), 0 0 0 2px rgba(255,255,255,.06) inset; }
  }
  .install-progress {
    width:100%; max-width:360px; height:2px;
    background:var(--bg3); border-radius:1px;
    overflow:hidden; margin:20px auto 8px;
    position:relative;
    display:none;
  }
  .install-progress::after {
    content:""; position:absolute; top:0; left:-40%;
    width:40%; height:100%;
    background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,.7) 50%, transparent 100%);
    animation: install-progress-slide 1.4s ease-in-out infinite;
  }
  @keyframes install-progress-slide {
    0%   { left:-40%; }
    100% { left:100%; }
  }
  .install-hint {
    font-size:10px; color:var(--muted); letter-spacing:1.5px;
    margin-top:14px; text-transform:uppercase; display:none;
  }
  body.installing .install-mark,
  body.installing .install-progress,
  body.installing .install-hint { display:flex; }
  @media (prefers-reduced-motion: reduce){
    .install-mark { animation:none; }
    .install-progress::after { animation:none; left:0; width:100%; background:rgba(255,255,255,.6); }
  }

  /* Smooth scrollbars (matches main UI) */
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb {
    background:rgba(255,255,255,.08); border-radius:4px;
    border:2px solid transparent; background-clip:padding-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background:rgba(255,255,255,.18); background-clip:padding-box;
  }

  .progress-detail{
    font-size:11px; color:var(--muted); margin-top:6px;
    font-variant-numeric:tabular-nums; letter-spacing:.02em;
    text-align:center; min-height:14px;
  }
  .progress-fill{
    transition:width .25s var(--ease-out-quart);
  }
  .ready-line{
    margin:14px auto 0; max-width:340px; text-align:center;
    font-size:12px; color:var(--accent); line-height:1.5;
    padding:10px 14px; border:1px solid rgba(126,217,130,.25);
    border-radius:6px; background:rgba(126,217,130,.05);
  }
  .error-block{
    margin:14px auto 0; max-width:340px;
    padding:12px 14px; border:1px solid #5a2a2a;
    border-radius:6px; background:rgba(180,60,60,.08);
  }
  .error-msg{
    font-size:12px; color:#ffb4b4; line-height:1.45;
    font-family:Consolas,'JetBrains Mono',monospace;
    word-break:break-word;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">HK</div>
    <div class="topbar-title">FREQ.PHULL</div>
    <div class="topbar-sub" id="topbar-sub">Updater</div>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" id="btn-min" title="Minimize" aria-label="Minimize">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="topbar-btn" id="btn-close" title="Close" aria-label="Close">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="body">
    <div class="lang-toggle">
      <button id="lang-en" class="on">EN</button>
      <button id="lang-fr">FR</button>
    </div>

    <div class="install-mark" id="install-mark">HK</div>

    <div class="hero-title" id="hero-title">SOFTWARE UPDATE</div>
    <div class="hero-sub" id="hero-sub">Checking for updates...</div>

    <div class="install-progress" id="install-progress-takeover"></div>
    <div class="install-hint" id="install-hint">PLEASE DO NOT CLOSE THIS WINDOW</div>

    <div class="versions" id="versions">
      <div class="vcard">
        <div class="vcard-label" id="lbl-installed">INSTALLED</div>
        <div class="vcard-num" id="ver-installed">-</div>
      </div>
      <div class="varrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </div>
      <div class="vcard new">
        <div class="vcard-label" id="lbl-update">THIS UPDATE</div>
        <div class="vcard-num" id="ver-update">-</div>
      </div>
    </div>

    <div class="status-badge" id="status-badge">UP TO DATE</div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-text" id="progress-text">Downloading 0%</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-detail" id="progress-detail"></div>
    </div>

    <div class="ready-line" id="ready-line" style="display:none"></div>

    <div class="error-block" id="error-block" style="display:none">
      <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="whats-new" id="whats-new" style="display:none">
      <div class="whats-new-title" id="lbl-whats-new">WHAT'S NEW</div>
      <ul class="whats-new-list" id="whats-new-list"></ul>
    </div>
  </div>

  <div class="footer">
    <button class="btn-secondary" id="btn-close-2">CLOSE</button>
    <button class="btn-secondary" id="btn-retry" style="display:none">TRY AGAIN</button>
    <button class="btn-primary" id="btn-install" style="display:none">INSTALL NOW</button>
  </div>

<script>
  const I = {
    en: {
      sub: 'Updater', heroTitleUpd: 'SOFTWARE UPDATE', heroTitleOk: 'UP TO DATE',
      heroSubOk: "You're running the latest version.",
      heroSubUpd: 'Version {v} is ready to install.',
      installed: 'INSTALLED', update: 'THIS UPDATE',
      badgeOk: 'UP TO DATE', badgeUpd: 'UPDATE AVAILABLE',
      badgeDl: 'DOWNLOADING', badgeReady: 'READY TO INSTALL', badgeCheck: 'CHECKING',
      whatsNew: "WHAT'S NEW", close: 'CLOSE', install: 'INSTALL NOW',
      progressPct: 'Downloading {p}%',
      progressDetail: '{tr} / {tot} MB \u00b7 {sp} MB/s \u00b7 {eta}',
      etaUnknown: 'estimating...',
      etaSeconds: '{s}s left',
      etaMinutes: '{m}m {s}s left',
      heroTitleInstalling: 'INSTALLING UPDATE',
      heroSubInstalling: 'Updating Freq.Phull to version {v}. This will only take a moment...',
      installHint: 'PLEASE DO NOT CLOSE THIS WINDOW',
      checking: 'Checking for updates...',
      badgeError: 'UPDATE FAILED',
      heroTitleError: 'UPDATE FAILED',
      heroSubError: 'Something went wrong. Try again or check Settings > Updates.',
      retry: 'TRY AGAIN',
      readyToInstall: 'Download complete. Click Install Now to apply the update.',
    },
    fr: {
      sub: 'Mise a jour', heroTitleUpd: 'MISE A JOUR', heroTitleOk: 'A JOUR',
      heroSubOk: "Vous utilisez la derniere version.",
      heroSubUpd: 'La version {v} est prete a etre installee.',
      installed: 'INSTALLEE', update: 'CETTE MAJ',
      badgeOk: 'A JOUR', badgeUpd: 'MAJ DISPONIBLE',
      badgeDl: 'TELECHARGEMENT', badgeReady: 'PRET A INSTALLER', badgeCheck: 'VERIFICATION',
      whatsNew: 'NOUVEAUTES', close: 'FERMER', install: 'INSTALLER',
      progressPct: 'Telechargement {p}%',
      progressDetail: '{tr} / {tot} Mo \u00b7 {sp} Mo/s \u00b7 {eta}',
      etaUnknown: 'estimation...',
      etaSeconds: '{s}s restantes',
      etaMinutes: '{m}m {s}s restantes',
      heroTitleInstalling: 'INSTALLATION',
      heroSubInstalling: 'Mise a jour de Freq.Phull vers la version {v}. Cela ne prendra qu\'un instant...',
      installHint: 'NE FERMEZ PAS CETTE FENETRE',
      checking: 'Verification des mises a jour...',
      badgeError: 'ECHEC',
      heroTitleError: 'ECHEC DE LA MISE A JOUR',
      heroSubError: 'Une erreur est survenue. Reessayez ou verifiez Parametres > Mises a jour.',
      retry: 'REESSAYER',
      readyToInstall: 'Telechargement termine. Cliquez sur Installer pour appliquer.',
    }
  };
  let lang = 'en';
  let state = { installed: '-', update: '-', notes: [], phase: 'checking', progress: 0, speed: 0 };

  function $(id) { return document.getElementById(id); }

  function applyLang() {
    const T = I[lang];
    $('topbar-sub').textContent = T.sub;
    $('lbl-installed').textContent = T.installed;
    $('lbl-update').textContent = T.update;
    $('lbl-whats-new').textContent = T.whatsNew;
    $('btn-close-2').textContent = T.close;
    $('btn-install').textContent = T.install;
    $('btn-retry').textContent = T.retry;
    render();
  }

  function fmtETA(percent, bps) {
    const T = I[lang];
    if (!bps || percent <= 0 || percent >= 100) return T.etaUnknown;
    const remainingBytes = (state.total || 0) * (1 - percent / 100);
    if (remainingBytes <= 0) return T.etaUnknown;
    const seconds = Math.round(remainingBytes / bps);
    if (seconds < 60) return T.etaSeconds.replace('{s}', seconds);
    return T.etaMinutes.replace('{m}', Math.floor(seconds / 60)).replace('{s}', seconds % 60);
  }

  function render() {
    const T = I[lang];
    if (state.phase === 'installing') {
      document.body.classList.add('installing');
      $('hero-title').textContent = T.heroTitleInstalling;
      $('hero-sub').textContent = T.heroSubInstalling.replace('{v}', state.update || '');
      $('install-hint').textContent = T.installHint;
      return;
    }
    document.body.classList.remove('installing');

    $('ver-installed').textContent = state.installed;
    $('ver-update').textContent = state.update;
    const badge = $('status-badge');
    const installBtn = $('btn-install');
    const whatsNew = $('whats-new');
    const progressWrap = $('progress-wrap');

    if (state.phase === 'checking') {
      $('hero-title').textContent = T.heroTitleUpd;
      $('hero-sub').textContent = T.checking;
      badge.textContent = T.badgeCheck;
      badge.className = 'status-badge update';
      installBtn.style.display = 'none';
      whatsNew.style.display = 'none';
      progressWrap.classList.remove('on');
    } else if (state.phase === 'none') {
      $('hero-title').textContent = T.heroTitleOk;
      $('hero-sub').textContent = T.heroSubOk;
      badge.textContent = T.badgeOk;
      badge.className = 'status-badge ok';
      installBtn.style.display = 'none';
      whatsNew.style.display = 'none';
      progressWrap.classList.remove('on');
    } else if (state.phase === 'error') {
      $('hero-title').textContent = T.heroTitleError;
      $('hero-sub').textContent = T.heroSubError;
      badge.textContent = T.badgeError;
      badge.className = 'status-badge update';
      installBtn.style.display = 'none';
      $('btn-retry').style.display = '';
      progressWrap.classList.remove('on');
      $('ready-line').style.display = 'none';
      $('error-block').style.display = '';
      $('error-msg').textContent = state.errorMessage || '';
      whatsNew.style.display = 'none';
    } else {
      $('hero-title').textContent = T.heroTitleUpd;
      $('hero-sub').textContent = T.heroSubUpd.replace('{v}', state.update);
      const map = { available: T.badgeUpd, downloading: T.badgeDl, ready: T.badgeReady };
      badge.textContent = map[state.phase];
      badge.className = 'status-badge update';
      installBtn.style.display = state.phase === 'ready' ? '' : 'none';
      $('btn-retry').style.display = 'none';
      $('error-block').style.display = 'none';
      if (state.notes && state.notes.length) {
        whatsNew.style.display = '';
        $('whats-new-list').innerHTML = state.notes.map(n =>
          '<li>' + (n + '').replace(/[<>&]/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;' }[c])) + '</li>').join('');
      } else {
        whatsNew.style.display = 'none';
      }
      if (state.phase === 'downloading') {
        progressWrap.classList.add('on');
        const pct = Math.max(0, Math.min(100, state.progress));
        $('progress-fill').style.width = pct + '%';
        $('progress-text').textContent = T.progressPct.replace('{p}', Math.round(pct));
        const tr  = ((state.transferred || 0) / 1048576).toFixed(1);
        const tot = ((state.total || 0) / 1048576).toFixed(1);
        const sp  = ((state.speed || 0) / 1048576).toFixed(2);
        $('progress-detail').textContent = T.progressDetail
          .replace('{tr}', tr).replace('{tot}', tot)
          .replace('{sp}', sp).replace('{eta}', fmtETA(pct, state.speed));
        $('ready-line').style.display = 'none';
      } else if (state.phase === 'ready') {
        progressWrap.classList.remove('on');
        $('ready-line').style.display = '';
        $('ready-line').textContent = T.readyToInstall;
      } else {
        progressWrap.classList.remove('on');
        $('ready-line').style.display = 'none';
      }
    }
  }

  $('lang-en').onclick = () => { lang = 'en'; $('lang-en').classList.add('on'); $('lang-fr').classList.remove('on'); applyLang(); };
  $('lang-fr').onclick = () => { lang = 'fr'; $('lang-fr').classList.add('on'); $('lang-en').classList.remove('on'); applyLang(); };
  $('btn-close').onclick = () => window.updaterAPI && window.updaterAPI.close();
  $('btn-close-2').onclick = () => window.updaterAPI && window.updaterAPI.close();
  $('btn-min').onclick = () => window.updaterAPI && window.updaterAPI.minimize();
  $('btn-install').onclick = () => window.updaterAPI && window.updaterAPI.install();
  $('btn-retry').onclick = () => {
    state.phase = 'checking';
    delete state.errorMessage;
    render();
    if (window.updaterAPI && window.updaterAPI.checkForUpdates) {
      window.updaterAPI.checkForUpdates();
    }
  };

  if (window.updaterAPI) {
    window.updaterAPI.onState((s) => { Object.assign(state, s); render(); });
    window.updaterAPI.ready();
  }
  applyLang();
</script>
</body>
</html>
